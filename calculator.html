<!doctype html>
<html>
	<head>
		<title></title>
		<style>
			input[type="text"]
			{
				padding:10px;
				width:90%;
				font-size:30px;
				color:black;
				background: white;	
			}
			input[type="button"]
			{
				padding:0px;
				color:white;
				width:60px;
				height:60px;
				box-shadow:1px 1px 1px white;
				border-radius:4px;
				background: rgb(34,195,195);
				font-size:22px;
			}
			input[type="button"]:hover
			{
				background:#1db6e0;
			}
			table
			{
				border:10px solid gray;
				box-shadow:3px 4px 4px black;
				margin-top:70px;
				background:gray;
				width:240px;
			}
		</style>
		<script>
		    function text(data)
			{
			  document.getElementById("output").value=document.getElementById("output").value+data;
			}
			function calculate()
			{
				document.getElementById("output").value=eval(document.getElementById("output").value)
			}
			function cleardata()
			{
				document.getElementById("output").value="";
			}
			function back()
			{
				var x=document.getElementById("output").value;
				document.getElementById("output").value=x.substr(0,x.length-1);
			}
		</script>
	</head>
	<body>
		<table align="center">
			<tr>
				<td colspan="4"><input id="output" type="text" > </td>
			</tr>
			<tr>
				<td><input type="button" value="C" onclick="cleardata()"/></td>
				<td><input type="button" value="%" onclick="text(this.value)"/></td>
				<td><input type="button" value="&lArr;" onclick="back()" /></td>
				<td><input type="button" value="/" onclick="text(this.value)"/></td>
			</tr>
			<tr>
				<td><input type="button" value="7" onclick="text(this.value)"/></td>
				<td><input type="button" value="8" onclick="text(this.value)"/></td>
				<td><input type="button" value="9" onclick="text(this.value)"/></td>
				<td><input type="button" value="*" onclick="text(this.value)"/></td>
			</tr>
			<tr>
				<td><input type="button" value="4" onclick="text(this.value)"/></td>
				<td><input type="button" value="5" onclick="text(this.value)"/></td>
				<td><input type="button" value="6" onclick="text(this.value)"/></td>
				<td><input type="button" value="-" onclick="text(this.value)"/></td>
			</tr>
			<tr>
				<td><input type="button" value="1" onclick="text(this.value)"/></td>
				<td><input type="button" value="2" onclick="text(this.value)"/></td>
				<td><input type="button" value="3" onclick="text(this.value)"/></td>
				<td><input type="button" value="+" onclick="text(this.value)"/></td>
			</tr>
			<tr>
				<td><input type="button" value="00" onclick="text(this.value)"/></td>
				<td><input type="button" value="0" onclick="text(this.value)"/></td>
				<td><input type="button" value="." onclick="text(this.value)"/></td>
				<td><input type="button" value="=" onclick="calculate()"/></td>
			</tr>
		</table>
	</body>
</html>
