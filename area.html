<!doctype html>
<html>
<head>
       <title></title>
	    <style>
	        .container {
			              margin:auto;
			              margin-top:150px;
                          background-color: white;
                          padding: 20px;
                          border-radius: 10px;
                          box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
                          text-align: center;
                          width: 300px;
                        }

            h1 {
                  margin-bottom: 20px;
                }
            .slider-container{
                               margin: 15px 0;
                             }
            label {
                    display: block;
                    margin-bottom: 10px;
                  }
            input[type=range]{
                               width: 100%;
                             }
            button {
                     background-color: #28a745;
                     color: white;
                     padding: 10px 20px;
                     border: none;
                     border-radius: 5px;
                     cursor: pointer;
                     margin-top: 20px;
                   }
            button:hover {
                           background-color: #218838;
                         }
            #result {
                      margin-top: 20px;
                      font-size: 1.2em;
                      font-weight: bold;
                    }
		    		
	    </style>
		
        <script>
		    function updateRadiusValue(value)
     		{
              document.getElementById('radiusValue').innerText = value;
            }

            function calculateArea()
			{
             const radius = document.getElementById('radius').value;
             const area = (Math.PI * radius * radius).toFixed(2);
             document.getElementById('result').innerText = `The area of the circle is 
			 ${area} cm².`;
            }
	    </script>
</head>
<body>
     <div class="container">
        <h1>Circle Area Calculator</h1>
        <div class="slider-container">
            <label for="radius">Radius (cm): <span id="radiusValue">50</span></label>
            <input type="range" id="radius" min="1" max="100" value="50" oninput="updateRadiusValue(this.value)">
        </div>
        <button onclick="calculateArea()">Calculate Area</button>
        <div id="result"></div>
    </div>
<body>
</html>
