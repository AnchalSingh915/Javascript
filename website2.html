<!doctype html>
<html>
<head>
     <title>Login Interface</title>
	 <style>
	    #box{
		     background-image:url("https://img.freepik.com/premium-photo/stethoscope-with-laptop-doctor-wood-table_28629-1809.jpg");
			 background-size:100%;
			 height:650px;
			 width:1250px;
		   }
		   #circle{
		         background-image:url("https://codelib.in/css-assignment/profile.jpg");
				 height:170px;
				 width:170px;
				 background-size:cover;
				 position:relative;
				 top:-20px;
				 border-radius:50%;
				 margin:-50px auto 0 auto;
		       }
		table{
		       height:370px;
			   width:400px;
			   background-color:black;
			   position:absolute;
               top: 100px;
               left: 400px;
		       padding-bottom:15px;
			   padding-left:15px;
			   padding-right:15px;
			   border-collapse:collapse;
		     }
	    #LW{
		    color:white;
			font-size:25px;
            padding-bottom:15px;
			   padding-left:15px;
			   padding-right:15px;
		  }
		#a1{
		     color:white;
		   }
		#login{
		     border-bottom:2px solid white;
			 border-right:2px solid white;
			 margin-left:30px;
			 margin-right:30px;
			 padding:10px;
			 color:white;
			 background:green;
			 
		   }
		input[type="text"]
		   {
		     height:35px;
			 width:300px;
			 font-size:15px;
			 background:none;
				border:0;
				border-bottom:2px solid white;
		   }
		#tc{
		     margin-left:30px;
             color:white;			 
		   }
		   
		
	 </style>
</head>
<body>
     <div id="box">
	 <frameset>
	      <table>
		    <tr><th><legend><div id="circle"></div></legend></th></tr>
			
		    <tr><th id="LW">Login Window</th></tr>
			<tr><th><input type="text" placeholder="Your Email Address"/></th></tr>
			<tr><th><input type="text" placeholder="Your Pasword"/></th></tr>
			<tr><td><div id="tc"><input type="checkbox" name="g1"/>Agree With <b>Terms & Condition</b></div></td></tr>
			<tr><th><div id="login">Login</div></th></tr>
		  </table>
	 </frameset>
	 </div>
</body>
</html>
