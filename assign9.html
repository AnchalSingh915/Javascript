<!doctype html>
<html>
<head>
       <title></title>
	   <script>
	  
		function check()
		{
			var num;
			num=parseInt(prompt("Enter any No "));
			if(num%2==0)
			{
				alert("No is Even")
			}
			else
			{
				alert("No is Odd")
			}
		}
	   </script>
</head>
<body>
	<input type="button" value="OK" onclick="check()"> 
<body>
</html>
